name: 自动化CI流水线

# 触发条件：只要往 develop 分支提 PR，或者往任何分支 push 代码都触发
on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "develop" ]

# 任务
jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      # 第一步：拉取代码
      - name: 检出代码
        uses: actions/checkout@v4

      # 第二步：安装 JDK 17 (如果是前端项目，这里改成安装 Node)
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven # 缓存 Maven 依赖，加快速度

      # 第三步：编译代码 + 运行单元测试
      - name: 编译与测试
        run: mvn clean compile test
